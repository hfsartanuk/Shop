<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order Confirmed — London Outlet Hisaronu Online Shopping</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-logo-wrap">
    <div class="logo-pattern">
      <div class="logo-text-london">LONDON</div>
      <div class="logo-text-outlet">OUTLET</div>
    </div>
  </a>
</nav>
<div class="success-page">
  <div class="success-icon">🎉</div>
  <h1>Order <span style="color:var(--red)">Confirmed!</span></h1>
  <p style="margin-bottom:.5rem">Thank you for shopping with London Outlet Hisaronu Online Shopping.</p>
  <p id="order-id-msg" style="color:var(--text-muted);font-size:.9rem;margin-bottom:2rem"></p>
  <p style="color:var(--text-muted);font-size:.9rem;max-width:500px;margin:0 auto 2rem">You'll receive a confirmation email from PayPal. Your order will be dispatched within 1–2 business days.</p>
  <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
    <a href="shop.html" class="btn btn-red">Continue Shopping</a>
    <a href="index.html" class="btn btn-outline">Back to Home</a>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');
if (orderId) document.getElementById('order-id-msg').textContent = 'Order ID: ' + orderId;
</script>
</body>
</html>
