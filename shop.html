<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop — London Outlet Hisaronu Online Shopping</title>
<meta name="description" content="Browse all products at London Outlet Hisaronu Online Shopping. Filter by category, size, colour and price.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shipping-banner">🚚 FREE SHIPPING on orders over £50 | Standard: £2.99 | UPS Priority: £15</div>
<nav class="navbar">
  <a href="index.html" class="navbar-logo-wrap">
    <div class="logo-pattern">
      <div class="logo-text-london">LONDON</div>
      <div class="logo-text-outlet">OUTLET</div>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="shop.html?cat=shirts">Shirts</a>
    <a href="shop.html?cat=jackets">Jackets</a>
    <a href="shop.html?cat=dresses">Dresses</a>
  </div>
  <div class="nav-actions">
    <button class="cart-btn" onclick="window.location='cart.html'">🛒 Cart <span class="cart-count" id="cart-count" style="display:none">0</span></button>
  </div>
</nav>

<div class="container" style="padding:2rem">
  <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:1.5rem">All Products</h1>
  <div class="shop-layout">
    <!-- FILTERS -->
    <div class="filters-panel">
      <div class="filter-group">
        <h4>Category</h4>
        <label class="filter-option"><input type="radio" name="cat" value="" id="cat-all" checked> <label for="cat-all">All</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="shirts" id="cat-shirts"> <label for="cat-shirts">Shirts</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="tshirts" id="cat-tshirts"> <label for="cat-tshirts">T-Shirts</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="trousers" id="cat-trousers"> <label for="cat-trousers">Trousers</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="jackets" id="cat-jackets"> <label for="cat-jackets">Jackets</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="dresses" id="cat-dresses"> <label for="cat-dresses">Dresses</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="hoodies" id="cat-hoodies"> <label for="cat-hoodies">Hoodies</label></label>
        <label class="filter-option"><input type="radio" name="cat" value="knitwear" id="cat-knitwear"> <label for="cat-knitwear">Knitwear</label></label>
      </div>
      <div class="filter-group">
        <h4>Price Range</h4>
        <label class="filter-option"><input type="radio" name="price" value="" id="p-all" checked> <label for="p-all">All Prices</label></label>
        <label class="filter-option"><input type="radio" name="price" value="0-20" id="p-low"> <label for="p-low">Under £20</label></label>
        <label class="filter-option"><input type="radio" name="price" value="20-50" id="p-mid"> <label for="p-mid">£20 – £50</label></label>
        <label class="filter-option"><input type="radio" name="price" value="50-999" id="p-high"> <label for="p-high">Over £50</label></label>
      </div>
      <div class="filter-group">
        <h4>Size</h4>
        <div class="size-grid" id="size-filter">
          <button class="size-btn active" data-size="">All</button>
          <button class="size-btn" data-size="XS">XS</button>
          <button class="size-btn" data-size="S">S</button>
          <button class="size-btn" data-size="M">M</button>
          <button class="size-btn" data-size="L">L</button>
          <button class="size-btn" data-size="XL">XL</button>
          <button class="size-btn" data-size="XXL">XXL</button>
        </div>
      </div>
      <button class="btn btn-outline btn-full" id="clear-filters" style="margin-top:.5rem">Clear Filters</button>
    </div>

    <!-- GRID -->
    <div>
      <div class="shop-toolbar">
        <span class="results-count" id="results-count"></span>
        <select class="sort-select" id="sort-select">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="products-grid" id="products-grid">
        <div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-muted)">Loading products...</div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-bottom">© 2026 London Outlet Hisaronu Online Shopping. All rights reserved.</div>
</footer>

<script src="js/app.js"></script>
<script>
let activeSize = '';

function initPage() {
  // Check URL params
  const params = new URLSearchParams(window.location.search);
  const catParam = params.get('cat');
  if (catParam) {
    const radio = document.querySelector(`input[name=cat][value="${catParam}"]`);
    if (radio) radio.checked = true;
  }

  document.querySelectorAll('input[name=cat], input[name=price]').forEach(el => el.addEventListener('change', renderGrid));
  document.getElementById('sort-select').addEventListener('change', renderGrid);
  document.querySelectorAll('#size-filter .size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#size-filter .size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSize = btn.dataset.size;
      renderGrid();
    });
  });
  document.getElementById('clear-filters').addEventListener('click', () => {
    document.querySelector('input[name=cat][value=""]').checked = true;
    document.querySelector('input[name=price][value=""]').checked = true;
    document.querySelector('#size-filter .size-btn[data-size=""]').click();
    document.getElementById('sort-select').value = 'default';
    renderGrid();
  });
  renderGrid();
}

function renderGrid() {
  const cat = document.querySelector('input[name=cat]:checked')?.value || '';
  const price = document.querySelector('input[name=price]:checked')?.value || '';
  const sort = document.getElementById('sort-select').value;
  const [pMin, pMax] = price ? price.split('-').map(Number) : [0, 999999];

  let filtered = products.filter(p => {
    if (p.active === false) return false;
    if (cat && p.category !== cat) return false;
    if (price && (p.price < pMin || p.price > pMax)) return false;
    if (activeSize && !p.sizes.includes(activeSize)) return false;
    return true;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('results-count').textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`;
  const grid = document.getElementById('products-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-muted)">No products match your filters.</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => renderProductCard(p)).join('');
}
</script>
</body>
</html>
