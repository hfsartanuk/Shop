<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cart — London Outlet Hisaronu Online Shopping</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shipping-banner">🚚 FREE SHIPPING on orders over £50 | Standard: £2.99 | UPS Priority: £15</div>
<nav class="navbar">
  <a href="index.html" class="navbar-logo-wrap">
    <div class="logo-pattern">
      <div class="logo-text-london">LONDON</div>
      <div class="logo-text-outlet">OUTLET</div>
    </div>
  </a>
  <div class="nav-links"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
  <div class="nav-actions">
    <button class="cart-btn" onclick="window.location='cart.html'">🛒 Cart <span class="cart-count" id="cart-count" style="display:none">0</span></button>
  </div>
</nav>

<div class="container" style="padding:2rem">
  <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:1.5rem">Your Cart</h1>
  <div class="cart-layout" id="cart-layout">
    <div style="text-align:center;padding:4rem;color:var(--text-muted)">Loading...</div>
  </div>
</div>

<footer><div class="footer-bottom">© 2026 London Outlet Hisaronu Online Shopping. All rights reserved.</div></footer>

<script src="js/app.js"></script>
<script>
function initPage() { renderCart(); }

function renderCart() {
  const layout = document.getElementById('cart-layout');
  if (cart.length === 0) {
    layout.innerHTML = `
      <div style="text-align:center;padding:5rem;grid-column:1/-1">
        <div style="font-size:4rem;margin-bottom:1rem">🛒</div>
        <h2 style="font-weight:700;margin-bottom:.5rem">Your cart is empty</h2>
        <p style="color:var(--text-muted);margin-bottom:2rem">Add some great items to get started!</p>
        <a href="shop.html" class="btn btn-red">Continue Shopping</a>
      </div>`;
    return;
  }

  const subtotal = getCartTotal();
  const toFree = Math.max(0, 50 - subtotal);
  const progress = Math.min(100, (subtotal / 50) * 100);

  layout.innerHTML = `
    <div>
      ${cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/90x110?text=?'">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-variant">Size: ${item.size} | Colour: ${item.color}</div>
            <div class="cart-item-price">£${(item.price * item.qty).toFixed(2)}</div>
            <div class="cart-item-controls">
              <button class="cart-qty-btn" onclick="updateQty('${item.key}', -1); renderCart()">−</button>
              <span style="font-weight:700;min-width:24px;text-align:center">${item.qty}</span>
              <button class="cart-qty-btn" onclick="updateQty('${item.key}', 1); renderCart()">+</button>
              <button class="cart-remove" onclick="removeFromCart('${item.key}'); renderCart()">✕ Remove</button>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <div class="order-summary">
      <h3>Order Summary</h3>
      ${toFree > 0 ? `
        <div class="shipping-threshold">
          🎉 Add <strong>£${toFree.toFixed(2)}</strong> more for FREE shipping!
          <div class="progress-bar-wrap" style="margin-top:.5rem">
            <div class="progress-bar-fill" style="width:${progress}%"></div>
          </div>
        </div>` : `<div class="shipping-threshold">✅ Your order qualifies for FREE standard shipping!</div>`}
      <div class="summary-row"><span>Subtotal</span><span>£${subtotal.toFixed(2)}</span></div>
      <div class="summary-row"><span>Standard Shipping</span><span>${subtotal >= 50 ? '<span style="color:var(--success)">FREE</span>' : '£2.99'}</span></div>
      <div class="summary-row summary-total"><span>Total</span><span>£${(subtotal + (subtotal >= 50 ? 0 : 2.99)).toFixed(2)}</span></div>
      <a href="checkout.html" class="btn btn-red btn-full" style="margin-top:1.2rem;font-size:1rem;padding:.9rem">Proceed to Checkout →</a>
      <a href="shop.html" class="btn btn-outline btn-full" style="margin-top:.7rem">Continue Shopping</a>
    </div>`;
}
</script>
</body>
</html>
